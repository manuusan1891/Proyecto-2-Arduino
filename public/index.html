<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ambiental - Arboretum Lussich</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="dashboard-container">
        <header>
            <h1>Arboretum Lussich</h1>
            <p class="subtitle">
                <span class="material-symbols-rounded icon-small">nature</span>
                Monitoreo Automático - 1 Medición por día
            </p>
        </header>

        <div class="cards-grid">
            
            <div class="card card-temp" onclick="abrirModal('temp')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">device_thermostat</span>
                        <h2>Temperatura</h2>
                    </div>
                    <div class="current-value" id="temp-val">--.- °C</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartTemperatura"></canvas>
                </div>
            </div>

            <div class="card card-suelo" onclick="abrirModal('suelo')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">potted_plant</span>
                        <h2>Humedad del Suelo</h2>
                    </div>
                    <div class="current-value" id="suelo-val">--%</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartSuelo"></canvas>
                </div>
            </div>

            <div class="card card-ambiente" onclick="abrirModal('ambiente')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">air</span>
                        <h2>Humedad del Ambiente</h2>
                    </div>
                    <div class="current-value" id="ambiente-val">--%</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartAmbiente"></canvas>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-detalle" class="modal" onclick="cerrarModalExterno(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <div class="modal-header-text">
                <h2 id="modal-titulo">Detalles del Sensor</h2>
                <p id="modal-subtitulo" class="subtitle-modal"></p>
            </div>
            
            <div class="modal-body">
                <div class="chart-container-modal">
                    <canvas id="chartModal"></canvas>
                </div>
                
                <div class="tabla-detalle-container">
                    <table class="tabla-detalle">
                        <thead>
                            <tr>
                                <th>Fecha y Hora</th>
                                <th>Valor Medido</th>
                                <th>Origen / Hardware</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body-detalle">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            databaseURL: "https://proyecto-arduino-11833-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let historialDatos = [];
        let historialCompleto = [];
        
        let graficaTemp = null;
        let graficaSuelo = null;
        let graficaAmbiente = null;
        let graficaModal = null;
        let sensorActualModal = null;

        const opcionesComunes = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c', maxRotation: 0, autoSkip: true, maxTicksLimit: 5, font: {family: 'Fira Code', size: 10} } },
                y: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c', font: {family: 'Fira Code', size: 10} } }
            }
        };

        function actualizarDashboardConDatosDeMemoria(nuevosDatos) {
            if (!nuevosDatos || nuevosDatos.length === 0) return;

            const etiquetasHoras = nuevosDatos.map(dato => dato.hora);
            const datosTemperatura = nuevosDatos.map(dato => dato.temperatura);
            const datosHumedadSuelo = nuevosDatos.map(dato => dato.humSuelo);
            const datosHumedadAmbiente = nuevosDatos.map(dato => dato.humAmbiente);

            const ultimoDato = nuevosDatos[nuevosDatos.length - 1];
            
            document.getElementById("temp-val").innerText = `${Number(ultimoDato.temperatura).toFixed(1)} °C`;
            document.getElementById("suelo-val").innerText = `${ultimoDato.humSuelo}%`;
            document.getElementById("ambiente-val").innerText = `${ultimoDato.humAmbiente}%`;

            if (graficaTemp) graficaTemp.destroy();
            if (graficaSuelo) graficaSuelo.destroy();
            if (graficaAmbiente) graficaAmbiente.destroy();

            const ctxTemp = document.getElementById('chartTemperatura').getContext('2d');
            graficaTemp = new Chart(ctxTemp, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosTemperatura, borderColor: '#ff9e5e', backgroundColor: 'rgba(255, 158, 94, 0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4 }]
                },
                options: { ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 10, max: 50, grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c' } } } }
            });

            const ctxSuelo = document.getElementById('chartSuelo').getContext('2d');
            graficaSuelo = new Chart(ctxSuelo, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosHumedadSuelo, borderColor: '#22c55e', backgroundColor: 'rgba(34, 197, 94, 0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4 }]
                },
                options: { ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 0, max: 100, grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c' } } } }
            });

            const ctxAmbiente = document.getElementById('chartAmbiente').getContext('2d');
            graficaAmbiente = new Chart(ctxAmbiente, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosHumedadAmbiente, borderColor: '#06b6d4', backgroundColor: 'rgba(6, 182, 212, 0.1)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4 }]
                },
                options: { ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 0, max: 100, grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c' } } } }
            });
        }

        function abrirModal(tipoSensor) {
            sensorActualModal = tipoSensor;
            document.getElementById("modal-detalle").style.display = "flex";
            setTimeout(() => document.getElementById("modal-detalle").style.opacity = "1", 10);
            actualizarModal();
        }

        function cerrarModal() {
            document.getElementById("modal-detalle").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("modal-detalle").style.display = "none";
                if (graficaModal) { graficaModal.destroy(); graficaModal = null; }
                sensorActualModal = null;
            }, 300);
        }

        function cerrarModalExterno(event) {
            if (event.target.classList.contains('modal')) cerrarModal();
        }

        function actualizarModal() {
            if (!sensorActualModal || historialCompleto.length === 0) return;

            let titulo = "", subtitulo = "", colorLinea = "", datosSensor = [], unidad = "", yMin = 0, yMax = 100, hardwareSensor = "";
            const etiquetasHoras = historialCompleto.map(dato => dato.hora);

            if (sensorActualModal === 'temp') {
                titulo = "Temperatura"; subtitulo = "Análisis térmico extendido"; colorLinea = "#ff9e5e"; datosSensor = historialCompleto.map(dato => dato.temperatura); unidad = " °C"; yMin = 10; yMax = 50; hardwareSensor = "DHT11 / Termistor";
            } else if (sensorActualModal === 'suelo') {
                titulo = "Humedad del Suelo"; subtitulo = "Absorción hídrica del sustrato"; colorLinea = "#22c55e"; datosSensor = historialCompleto.map(dato => dato.humSuelo); unidad = "%"; hardwareSensor = "Sonda YL-69";
            } else if (sensorActualModal === 'ambiente') {
                titulo = "Humedad Atmosférica"; subtitulo = "Humedad relativa del aire"; colorLinea = "#06b6d4"; datosSensor = historialCompleto.map(dato => dato.humAmbiente); unidad = "%"; hardwareSensor = "Sensor DHT11 / DHT22";
            }

            document.getElementById("modal-titulo").innerText = titulo;
            document.getElementById("modal-subtitulo").innerText = subtitulo;

            if (graficaModal) graficaModal.destroy();
            const ctxModal = document.getElementById('chartModal').getContext('2d');
            
            graficaModal = new Chart(ctxModal, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosSensor, borderColor: colorLinea, backgroundColor: colorLinea + '1A', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2, pointBackgroundColor: colorLinea }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6b8e7c', font: {family: 'Fira Code'} } }, y: { min: yMin, max: yMax, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6b8e7c', font: {family: 'Fira Code'} } } } }
            });

            const tbody = document.getElementById("tabla-body-detalle");
            tbody.innerHTML = "";
            for (let i = historialCompleto.length - 1; i >= 0; i--) {
                const registro = historialCompleto[i];
                let val = sensorActualModal === 'temp' ? `${Number(registro.temperatura).toFixed(1)}${unidad}` : sensorActualModal === 'suelo' ? `${registro.humSuelo}${unidad}` : `${registro.humAmbiente}${unidad}`;
                tbody.innerHTML += `<tr><td class="code-font">${registro.hora}</td><td class="code-font font-bold" style="color: ${colorLinea};">${val}</td><td><span class="badge-sensor" style="border-color: ${colorLinea}40; color: ${colorLinea}; background: ${colorLinea}10;">${hardwareSensor}</span></td></tr>`;
            }
        }

        database.ref('/').on('value', (snapshot) => {
            const datosFirebase = snapshot.val();
            if (datosFirebase) {
                historialCompleto = [];
                Object.keys(datosFirebase).forEach(key => {
                    const r = datosFirebase[key];
                    if (r && (r.temperatura !== undefined || r.humSuelo !== undefined)) {
                        let et = r.timestamp ? new Date(r.timestamp).toLocaleDateString([], {day: '2-digit', month: '2-digit'}) + " " + new Date(r.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : new Date().toLocaleDateString([], {day: '2-digit', month: '2-digit'});
                        historialCompleto.push({ hora: et, temperatura: Number(r.temperatura||0), humAmbiente: Number(r.humAmbiente||0), humSuelo: Number(r.humSuelo||0) });
                    }
                });
                if (historialCompleto.length === 0 && (datosFirebase.temperatura !== undefined || datosFirebase.sensores)) {
                    const origen = datosFirebase.sensores ? datosFirebase.sensores : datosFirebase;
                    historialCompleto.push({ hora: `${new Date().toLocaleDateString([], {day: '2-digit', month: '2-digit'})} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`, temperatura: Number(origen.temperatura||0), humAmbiente: Number(origen.humAmbiente||0), humSuelo: Number(origen.humSuelo||0) });
                }
                historialDatos = [...historialCompleto].slice(-8);
                actualizarDashboardConDatosDeMemoria(historialDatos);
                if (sensorActualModal) actualizarModal();
            }
        }, (error) => console.log("Error Firebase:", error));
    </script>
</body>
</html>
