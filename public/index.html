<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ambiental - Arboretum Lussich</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="dashboard-container">
        <header>
            <h1>Arboretum Lussich</h1>
            <p class="subtitle">
                <span class="material-symbols-rounded icon-small">nature</span>
                Monitoreo Automático - Umbrales de Semáforo
            </p>
        </header>

        <div class="cards-grid">
            
            <div class="card card-temp" onclick="abrirModal('temp')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">device_thermostat</span>
                        <h2>Temperatura</h2>
                    </div>
                    <div class="current-value" id="temp-val">--.- °C</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartTemperatura"></canvas>
                </div>
            </div>

            <div class="card card-suelo" onclick="abrirModal('suelo')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">potted_plant</span>
                        <h2>Humedad del Suelo</h2>
                    </div>
                    <div class="current-value" id="suelo-val">--%</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartSuelo"></canvas>
                </div>
            </div>

            <div class="card card-ambiente" onclick="abrirModal('ambiente')">
                <div class="card-header">
                    <div class="header-title">
                        <span class="material-symbols-rounded">air</span>
                        <h2>Humedad del Ambiente</h2>
                    </div>
                    <div class="current-value" id="ambiente-val">--%</div>
                </div>
                <div class="chart-container">
                    <canvas id="chartAmbiente"></canvas>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-detalle" class="modal" onclick="cerrarModalExterno(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <div class="modal-header-text">
                <h2 id="modal-titulo">Detalles del Sensor</h2>
                <p id="modal-subtitulo" class="subtitle-modal"></p>
            </div>
            
            <div class="modal-body">
                <div class="chart-container-modal">
                    <canvas id="chartModal"></canvas>
                </div>
                
                <div class="tabla-detalle-container">
                    <table class="tabla-detalle">
                        <thead>
                            <tr>
                                <th>Fecha y Hora</th>
                                <th>Valor Medido</th>
                                <th>Origen / Hardware</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body-detalle">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // 🔧 PANEL DE CONTROL GENERAL
        // =========================================================
        // Cambiá esto a 'false' cuando quieras volver a usar el Arduino real
        const MODO_SIMULACION = true; 

        // Datos reales de Maldonado (Últimos 7 días) para la captura
        const datosMaldonado = [
            { hora: "19/06 12:00", temperatura: 13.5, humAmbiente: 65, humSuelo: 55 },
            { hora: "20/06 12:00", temperatura: 14.0, humAmbiente: 60, humSuelo: 52 },
            { hora: "21/06 12:00", temperatura: 11.0, humAmbiente: 75, humSuelo: 68 },
            { hora: "22/06 12:00", temperatura: 15.0, humAmbiente: 82, humSuelo: 74 },
            { hora: "23/06 12:00", temperatura: 16.5, humAmbiente: 80, humSuelo: 70 },
            { hora: "24/06 12:00", temperatura: 15.0, humAmbiente: 78, humSuelo: 65 },
            { hora: "25/06 12:00", temperatura: 12.0, humAmbiente: 62, humSuelo: 60 }
        ];

        // Configuración de Firebase
        const firebaseConfig = {
            databaseURL: "https://proyecto-arduino-11833-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let historialCompleto = [];
        let graficaTemp = null;
        let graficaSuelo = null;
        let graficaAmbiente = null;
        let graficaModal = null;
        let sensorActualModal = null;

        // Colores translúcidos de fondo (Semáforo de Riesgo)
        const zonasSemaforo = {
            verde: 'rgba(34, 197, 94, 0.08)',
            amarillo: 'rgba(234, 179, 8, 0.08)',
            rojo: 'rgba(239, 68, 68, 0.08)'
        };

        const opcionesComunes = {
            responsive: true, maintainAspectRatio: false,
            scales: {
                x: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c', font: {family: 'Fira Code', size: 10} } },
                y: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#6b8e7c', font: {family: 'Fira Code', size: 10} } }
            }
        };

        function actualizarDashboard(datos) {
            if (!datos || datos.length === 0) return;

            const etiquetasHoras = datos.map(d => d.hora);
            const datosTemp = datos.map(d => d.temperatura);
            const datosSuelo = datos.map(d => d.humSuelo);
            const datosAmb = datos.map(d => d.humAmbiente);

            const ultimoDato = datos[datos.length - 1];
            
            document.getElementById("temp-val").innerText = `${Number(ultimoDato.temperatura).toFixed(1)} °C`;
            document.getElementById("suelo-val").innerText = `${ultimoDato.humSuelo}%`;
            document.getElementById("ambiente-val").innerText = `${ultimoDato.humAmbiente}%`;

            if (graficaTemp) graficaTemp.destroy();
            if (graficaSuelo) graficaSuelo.destroy();
            if (graficaAmbiente) graficaAmbiente.destroy();

            // 1. Gráfica Temperatura
            graficaTemp = new Chart(document.getElementById('chartTemperatura').getContext('2d'), {
                type: 'line',
                data: { labels: etiquetasHoras, datasets: [{ data: datosTemp, borderColor: '#ff9e5e', tension: 0.4, borderWidth: 3, pointRadius: 3, pointBackgroundColor: '#ff9e5e' }] },
                options: { 
                    ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 10, max: 50 } },
                    plugins: { legend: { display: false }, annotation: { annotations: {
                        v: { type: 'box', yMin: 10, yMax: 30, backgroundColor: zonasSemaforo.verde, borderWidth: 0 },
                        a: { type: 'box', yMin: 30, yMax: 36, backgroundColor: zonasSemaforo.amarillo, borderWidth: 0 },
                        r: { type: 'box', yMin: 36, yMax: 50, backgroundColor: zonasSemaforo.rojo, borderWidth: 0 }
                    }}}
                }
            });

            // 2. Gráfica Suelo
            graficaSuelo = new Chart(document.getElementById('chartSuelo').getContext('2d'), {
                type: 'line',
                data: { labels: etiquetasHoras, datasets: [{ data: datosSuelo, borderColor: '#22c55e', tension: 0.4, borderWidth: 3, pointRadius: 3, pointBackgroundColor: '#22c55e' }] },
                options: { 
                    ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 0, max: 100 } },
                    plugins: { legend: { display: false }, annotation: { annotations: {
                        r: { type: 'box', yMin: 0, yMax: 30, backgroundColor: zonasSemaforo.rojo, borderWidth: 0 },
                        v: { type: 'box', yMin: 30, yMax: 75, backgroundColor: zonasSemaforo.verde, borderWidth: 0 },
                        a: { type: 'box', yMin: 75, yMax: 100, backgroundColor: zonasSemaforo.amarillo, borderWidth: 0 }
                    }}}
                }
            });

            // 3. Gráfica Ambiente
            graficaAmbiente = new Chart(document.getElementById('chartAmbiente').getContext('2d'), {
                type: 'line',
                data: { labels: etiquetasHoras, datasets: [{ data: datosAmb, borderColor: '#06b6d4', tension: 0.4, borderWidth: 3, pointRadius: 3, pointBackgroundColor: '#06b6d4' }] },
                options: { 
                    ...opcionesComunes, scales: { ...opcionesComunes.scales, y: { min: 0, max: 100 } },
                    plugins: { legend: { display: false }, annotation: { annotations: {
                        a: { type: 'box', yMin: 0, yMax: 40, backgroundColor: zonasSemaforo.amarillo, borderWidth: 0 },
                        v: { type: 'box', yMin: 40, yMax: 80, backgroundColor: zonasSemaforo.verde, borderWidth: 0 },
                        r: { type: 'box', yMin: 80, yMax: 100, backgroundColor: zonasSemaforo.rojo, borderWidth: 0 }
                    }}}
                }
            });
        }

        // =========================================================
        // INICIO DEL PROGRAMA
        // =========================================================
        if (MODO_SIMULACION) {
            console.log("🟢 MODO SIMULACIÓN ACTIVADO: Cargando datos de Maldonado...");
            historialCompleto = datosMaldonado;
            actualizarDashboard(historialCompleto);
        } else {
            console.log("📡 MODO REAL ACTIVADO: Conectando a Firebase...");
            
            // Intentamos recuperar datos guardados localmente
            try {
                const guardado = localStorage.getItem('historial_arboretum_vfinal');
                if (guardado) historialCompleto = JSON.parse(guardado);
            } catch (e) {}

            // Escucha infalible: Busca los datos sin importar si están anidados o planos
            database.ref('/').on('value', (snapshot) => {
                let t = snapshot.child('temperatura').val() || snapshot.child('sensores/temperatura').val();
                let hA = snapshot.child('humAmbiente').val() || snapshot.child('sensores/humAmbiente').val();
                let hS = snapshot.child('humSuelo').val() || snapshot.child('sensores/humSuelo').val();

                if (t !== null && hS !== null) {
                    let ahora = new Date();
                    let et = ahora.toLocaleDateString([], {day: '2-digit', month: '2-digit'}) + " " + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const ultimoRegistro = historialCompleto[historialCompleto.length - 1];
                    const esDatoNuevo = !ultimoRegistro || ultimoRegistro.temperatura !== Number(t) || ultimoRegistro.hora !== et;

                    if (esDatoNuevo) {
                        historialCompleto.push({ hora: et, temperatura: Number(t), humAmbiente: Number(hA), humSuelo: Number(hS) });
                        localStorage.setItem('historial_arboretum_vfinal', JSON.stringify(historialCompleto));
                    }
                    
                    actualizarDashboard([...historialCompleto].slice(-8));
                }
            });
        }

        // Funciones del Modal (Ventana emergente)
        function abrirModal(tipoSensor) { sensorActualModal = tipoSensor; document.getElementById("modal-detalle").style.display = "flex"; setTimeout(() => document.getElementById("modal-detalle").style.opacity = "1", 10); actualizarModal(); }
        function cerrarModal() { document.getElementById("modal-detalle").style.opacity = "0"; setTimeout(() => { document.getElementById("modal-detalle").style.display = "none"; if (graficaModal) { graficaModal.destroy(); graficaModal = null; } sensorActualModal = null; }, 300); }
        function cerrarModalExterno(event) { if (event.target.classList.contains('modal')) cerrarModal(); }
        function actualizarModal() { /* Lógica abreviada para el modal */ }

    </script>
</body>
</html>
