<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ambiental - Arduino en Vivo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>Arboretum Lussich</h1>
            <p class="subtitle">Monitoreo Automático - Datos en Tiempo Real (Cada 5 min)</p>
        </header>

        <div class="card card-temp">
            <div class="card-header">
                <h2>Temperatura (°C)</h2>
                <div class="current-value" id="temp-val">--.- °C</div>
            </div>
            <div class="chart-container">
                <canvas id="chartTemperatura"></canvas>
            </div>
        </div>

        <div class="card card-suelo">
            <div class="card-header">
                <h2>Humedad del Suelo (%)</h2>
                <div class="current-value" id="suelo-val">--%</div>
            </div>
            <div class="chart-container">
                <canvas id="chartSuelo"></canvas>
            </div>
        </div>

        <div class="card card-ambiente">
            <div class="card-header">
                <h2>Humedad del Ambiente (%)</h2>
                <div class="current-value" id="ambiente-val">--%</div>
            </div>
            <div class="chart-container">
                <canvas id="chartAmbiente"></canvas>
            </div>
        </div>
    </div>

    <script>
        let graficaTemp = null;
        let graficaSuelo = null;
        let graficaAmbiente = null;

        const opcionesComunes = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
            }
        };

        function actualizarDashboardConDatosDeMemoria(nuevosDatos) {
            if (!nuevosDatos || nuevosDatos.length === 0) return;

            const etiquetasHoras = nuevosDatos.map(dato => dato.hora);
            const datosTemperatura = nuevosDatos.map(dato => dato.temperatura);
            const datosHumedadSuelo = nuevosDatos.map(dato => dato.humSuelo);
            const datosHumedadAmbiente = nuevosDatos.map(dato => dato.humAmbiente);

            // Cambiar los valores de los textos gigantes con el último dato recibido
            const ultimoDato = nuevosDatos[nuevosDatos.length - 1];
            document.getElementById("temp-val").innerText = `${ultimoDato.temperatura.toFixed(1)} °C`;
            document.getElementById("suelo-val").innerText = `${ultimoDato.humSuelo}%`;
            document.getElementById("ambiente-val").innerText = `${ultimoDato.humAmbiente}%`;

            // Destruir instancias viejas para evitar superposiciones
            if (graficaTemp) graficaTemp.destroy();
            if (graficaSuelo) graficaSuelo.destroy();
            if (graficaAmbiente) graficaAmbiente.destroy();

            // --- Gráfica 1: Temperatura ---
            const ctxTemp = document.getElementById('chartTemperatura').getContext('2d');
            graficaTemp = new Chart(ctxTemp, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosTemperatura, borderColor: '#ff7b72', backgroundColor: 'rgba(255, 123, 114, 0.05)', fill: true, tension: 0.4, borderWidth: 2 }]
                },
                options: {
                    ...opcionesComunes,
                    scales: { y: { min: 10, max: 50, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } } },
                    plugins: {
                        annotation: {
                            annotations: {
                                zonaIntermedia: { type: 'box', yMin: 30, yMax: 36, backgroundColor: 'rgba(218, 165, 32, 0.12)' },
                                zonaAlta: { type: 'box', yMin: 36, yMax: 50, backgroundColor: 'rgba(255, 0, 0, 0.15)' }
                            }
                        }
                    }
                }
            });

            // --- Gráfica 2: Humedad del Suelo ---
            const ctxSuelo = document.getElementById('chartSuelo').getContext('2d');
            graficaSuelo = new Chart(ctxSuelo, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosHumedadSuelo, borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.05)', fill: true, tension: 0.4, borderWidth: 2 }]
                },
                options: {
                    ...opcionesComunes,
                    scales: { y: { min: 0, max: 100, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } } }
                }
            });

            // --- Gráfica 3: Humedad del Ambiente ---
            const ctxAmbiente = document.getElementById('chartAmbiente').getContext('2d');
            graficaAmbiente = new Chart(ctxAmbiente, {
                type: 'line',
                data: {
                    labels: etiquetasHoras,
                    datasets: [{ data: datosHumedadAmbiente, borderColor: '#56d4dd', backgroundColor: 'rgba(86, 212, 221, 0.05)', fill: true, tension: 0.4, borderWidth: 2 }]
                },
                options: {
                    ...opcionesComunes,
                    scales: { y: { min: 0, max: 100, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } } }
                }
            });
        }

        function cargarDatosDesdeArchivo() {
            // Evita el caché del navegador sumando el timestamp (?t=...)
            fetch('datos.json?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error("Esperando datos válidos...");
                    return response.json();
                })
                .then(datos => {
                    actualizarDashboardConDatosDeMemoria(datos);
                })
                .catch(error => console.log("Monitoreo:", error.message));
        }

        window.onload = cargarDatosDesdeArchivo;

        // Comprueba cambios cada 300000 ms (5 minutos) de forma automática
        setInterval(cargarDatosDesdeArchivo, 300000);
    </script>
</body>
</html>
